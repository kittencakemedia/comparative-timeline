<!DOCTYPE html>
<html>
<head>
    <title>Simple Modal Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 99999;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            z-index: 100000;
            min-width: 300px;
        }
        .close { float: right; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <h1>Simple Modal Test</h1>
    <p>This tests whether the modal positioning works in your GitHub Pages environment.</p>
    <button id="test-btn">Open Modal</button>
    
    <div class="modal-overlay" id="overlay"></div>
    <div class="modal" id="modal">
        <span class="close" id="close-btn">&times;</span>
        <h3>Test Modal</h3>
        <p>This modal should appear centered in your screen.</p>
    </div>
    
    <script>
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('close-btn');
        const testBtn = document.getElementById('test-btn');
        
        testBtn.onclick = () => {
            overlay.style.display = 'block';
            modal.style.display = 'block';
        };
        
        closeBtn.onclick = () => {
            overlay.style.display = 'none';
            modal.style.display = 'none';
        };
        
        overlay.onclick = () => {
            overlay.style.display = 'none';
            modal.style.display = 'none';
        };
    </script>
</body>
</html>
