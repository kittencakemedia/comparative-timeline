<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Historical Parallels - Comparative Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Historical Parallels: Comparative Timeline</h1>
        <div class="controls">
            <button id="zoom-in">Zoom In</button>
            <button id="zoom-out">Zoom Out</button>
            <button id="reset-view">Reset</button>
            <button id="fit-view">Fit to Screen</button>
        </div>
        <div class="legend">
            <div><span class="legend-color red"></span> Hitler Era</div>
            <div><span class="legend-color blue"></span> Trump Era (Mapped to Hitler Dates)</div>
        </div>
    </header>

    <div class="timeline-container" id="timeline-container">
        <div class="timeline-inner" id="timeline-inner">
            <div class="top-section">
                <div class="timeline-track" id="top-timeline"></div>
                <div class="year-markers top-markers" id="top-year-markers"></div>
                <div class="era-label">Hitler Era (1923-1945)</div>
            </div>
            <div class="baseline-container">
                <div class="baseline-line"></div>
                <div class="baseline-label">COMPARATIVE BASELINE</div>
            </div>
            <div class="bottom-section">
                <div class="year-markers bottom-markers" id="bottom-year-markers"></div>
                <div class="timeline-track" id="bottom-timeline"></div>
                <div class="era-label">Trump Era (Mapped to Hitler Dates)</div>
            </div>
        </div>
    </div>
    <div class="zoom-hint">Click any card for details</div>
    <footer>Historical comparison for educational purposes</footer>
</div>

<script src="js/data.js"></script>
<script src="js/modal.js"></script>
<script src="js/timeline.js"></script>
</body>
</html>
